<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk | The Mirrorgate</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-black: #0A0A0A;
      --navy-depth: #0A2540;
      --gold-armor: #C9A23E;
      --lilac-pulse: #C08CCF;
      --starlight: #F2F6FF;
      --active-green: #00ff41;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-depth) 0%, var(--bg-black) 100%);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Inter', sans-serif;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* =============================================
       TERMINAL WINDOW
    ============================================= */
    .terminal-window {
      position: relative; z-index: 10;
      width: min(900px, 94vw); 
      height: min(600px, 80vh);
      background-color: rgba(10, 10, 10, 0.98);
      border: 1px solid rgba(201, 162, 62, 0.4); 
      border-radius: 4px;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 0 40px rgba(192, 140, 207, 0.15), 0 40px 100px rgba(0,0,0,0.9);
      backdrop-filter: blur(4px);
    }

    .title-bar {
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      padding: 10px 16px; display: flex; align-items: center;
      border-bottom: 2px solid var(--gold-armor); flex-shrink: 0;
    }

    .title-text { flex: 1; display: flex; align-items: center; justify-content: center; gap: 15px; }
    .led { width: 8px; height: 8px; background-color: var(--active-green); border-radius: 50%; box-shadow: 0 0 8px var(--active-green); }
    .title-label { color: var(--gold-armor); font-family: 'Cinzel Decorative', serif; font-size: 11px; letter-spacing: 3px; }

    /* =============================================
       ADVENTURE LOG (BODY)
    ============================================= */
    .terminal-body {
      flex: 1; display: flex; flex-direction: column;
      justify-content: flex-start; 
      padding: 40px; overflow-y: auto;
      font-family: 'Orbitron', sans-serif; font-size: 14px;
      line-height: 1.8; color: var(--starlight);
      scrollbar-width: none;
    }
    .terminal-body::-webkit-scrollbar { display: none; }

    .crt-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 5; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12), rgba(0,0,0,0.12) 1px, transparent 1px, transparent 2px); opacity: 0.2; }

    /* TEXT STYLES */
    .narrative { margin-bottom: 20px; opacity: 0.8; }
    .speaker-label { color: var(--gold-armor); font-family: 'Cinzel Decorative', serif; font-weight: 700; margin-right: 10px; }
    .dialog { color: var(--lilac-pulse); text-shadow: 0 0 5px var(--lilac-pulse); margin-bottom: 20px; }
    .system-msg { color: var(--active-green); margin-top: 30px; font-size: 12px; }

    .cursor {
      display: inline-block; width: 10px; height: 1.2em;
      background-color: var(--active-green); vertical-align: middle;
      box-shadow: 0 0 8px var(--active-green);
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* CHOICE BUTTONS */
    #choices {
      margin-top: auto; display: flex; gap: 20px; opacity: 0;
      transition: opacity 1s ease;
    }
    .choice-btn {
      background: transparent; border: 1px solid var(--gold-armor);
      color: var(--gold-armor); padding: 10px 20px; font-family: 'Orbitron', sans-serif;
      font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s;
    }
    .choice-btn:hover { background: var(--gold-armor); color: var(--bg-black); box-shadow: 0 0 15px var(--gold-armor); }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="terminal-window">
    <div class="title-bar">
      <div class="title-text">
        <div class="led"></div>
        <span class="title-label">MIRRORGATE LOG // SECTOR 01</span>
      </div>
    </div>

    <div class="terminal-body" id="log">
      <div class="crt-overlay"></div>
      
      <div id="typewriter-content"></div>
      
      <div id="choices">
        <button class="choice-btn" onclick="location.href='intro.html'">[ I am a Traveler ]</button>
        <button class="choice-btn" onclick="location.href='directory.html'">[ I seek the Reserves ]</button>
      </div>
    </div>
  </div>

  <script>
    const log = document.getElementById('typewriter-content');
    const choiceContainer = document.getElementById('choices');

    const storyLines = [
      { type: 'narrative', text: "The Mirrorgate ripples behind you, a liquid pool of starlight that slowly solidifies back into cold stone." },
      { type: 'narrative', text: "A heavy metallic CLANG echoes through the chamber. Out of the navy-depth shadows steps a figure in sunrise-gold armor." },
      { type: 'dialog', speaker: "SERGEANT KAELEN", text: "\"Halt, Traveler. You've crossed the threshold with the momentum of a falling star.\"" },
      { type: 'dialog', speaker: "SERGEANT KAELEN", text: "\"State your business. Are you a hero in a hurry, or a ghost running from The Ruins?\"" },
      { type: 'system', text: "> SERGEANT KAELEN is gauging your intent. How do you respond?" }
    ];

    let currentLine = 0;

    function typeLine() {
      if (currentLine < storyLines.length) {
        const data = storyLines[currentLine];
        const lineDiv = document.createElement('div');
        lineDiv.className = data.type;

        if (data.speaker) {
          const speaker = document.createElement('span');
          speaker.className = 'speaker-label';
          speaker.textContent = data.speaker + ":";
          lineDiv.appendChild(speaker);
        }

        const textSpan = document.createElement('span');
        lineDiv.appendChild(textSpan);
        log.appendChild(lineDiv);

        let charIdx = 0;
        function typeChar() {
          if (charIdx < data.text.length) {
            textSpan.textContent += data.text[charIdx];
            charIdx++;
            setTimeout(typeChar, 30);
          } else {
            currentLine++;
            setTimeout(typeLine, 800);
          }
        }
        typeChar();
      } else {
        // Show choices when story is done
        choiceContainer.style.opacity = '1';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        log.appendChild(cursor);
      }
    }

    // STAR ENGINE
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    let stars = Array.from({ length: 40 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2 }));
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(242, 246, 255, 0.3)";
      stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill(); s.y -= 0.1; if (s.y < 0) s.y = canvas.height; });
      requestAnimationFrame(animate);
    }
    animate();
    window.onload = typeLine;
  </script>
</body>
</html>
