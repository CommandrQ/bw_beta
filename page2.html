<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk | Void</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-black: #0A0A0A;
      --navy-depth: #0A2540;
      --gold-armor: #C9A23E;
      --lilac-pulse: #C08CCF;
      --starlight: #F2F6FF;
      --active-green: #00ff41;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-depth) 0%, var(--bg-black) 100%);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Inter', sans-serif;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* =============================================
       TERMINAL WINDOW (STATIC & ACTIVE)
    ============================================= */
    .terminal-window {
      position: relative; z-index: 10;
      width: min(900px, 94vw); 
      height: min(600px, 80vh);
      background-color: rgba(10, 10, 10, 0.98);
      border: 1px solid rgba(201, 162, 62, 0.4); 
      border-radius: 4px;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 0 40px rgba(192, 140, 207, 0.15), 0 40px 100px rgba(0,0,0,0.9);
      backdrop-filter: blur(4px);
    }

    .title-bar {
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      padding: 12px 16px; display: flex; align-items: center;
      border-bottom: 2px solid var(--gold-armor); flex-shrink: 0;
    }

    .title-text { flex: 1; display: flex; align-items: center; justify-content: center; gap: 15px; }
    
    .led { 
      width: 8px; height: 8px; 
      background-color: var(--active-green); 
      border-radius: 50%; 
      box-shadow: 0 0 8px var(--active-green); 
      animation: led-blink 2.5s ease-in-out infinite; 
    }
    
    @keyframes led-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    .title-label { 
      color: var(--gold-armor); 
      font-family: 'Cinzel Decorative', serif; 
      font-size: 12px; 
      letter-spacing: 4px; 
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(201, 162, 62, 0.5);
    }

    /* =============================================
       BODY & CURSOR
    ============================================= */
    .terminal-body {
      flex: 1; display: flex;
      justify-content: center; align-items: center;
      position: relative;
    }

    .cursor {
      width: 14px; height: 1.6em;
      background-color: var(--active-green);
      box-shadow: 0 0 12px var(--active-green);
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .crt-overlay { 
      position: absolute; inset: 0; pointer-events: none; z-index: 5; 
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12), rgba(0,0,0,0.12) 1px, transparent 1px, transparent 2px); 
      opacity: 0.25; 
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="terminal-window">
    <div class="title-bar">
      <div class="title-text">
        <div class="led"></div>
        <span class="title-label">Vanguard Knetwerk Active</span>
      </div>
    </div>

    <div class="terminal-body">
      <div class="crt-overlay"></div>
      
      <div class="cursor"></div>
    </div>
  </div>

  <script>
    // COSMIC DRIFT ENGINE
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();

    let stars = Array.from({ length: 50 }, () => ({ 
      x: Math.random() * canvas.width, 
      y: Math.random() * canvas.height, 
      s: Math.random() * 1.8 + 0.2 
    }));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(242, 246, 255, 0.35)";
      stars.forEach(s => { 
        ctx.beginPath(); 
        ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); 
        ctx.fill(); 
        s.y -= 0.15; 
        if (s.y < 0) s.y = canvas.height; 
      });
      requestAnimationFrame(animate);
    }
    
    animate();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
