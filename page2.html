<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk | The Encounter</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-black: #0A0A0A;
      --navy-depth: #0A2540;
      --gold-armor: #C9A23E;
      --lilac-pulse: #C08CCF;
      --starlight: #F2F6FF;
      --active-green: #00ff41;
      --alert-red: #ff3131;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-depth) 0%, var(--bg-black) 100%);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Inter', sans-serif;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* =============================================
       TERMINAL WINDOW
    ============================================= */
    .terminal-window {
      position: relative; z-index: 10;
      width: min(900px, 94vw); 
      height: min(600px, 80vh);
      background-color: rgba(10, 10, 10, 0.98);
      border: 1px solid rgba(201, 162, 62, 0.4); 
      border-radius: 4px;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 0 40px rgba(192, 140, 207, 0.15), 0 40px 100px rgba(0,0,0,0.9);
      backdrop-filter: blur(4px);
    }

    .title-bar {
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      padding: 10px 16px; border-bottom: 2px solid var(--gold-armor);
      text-align: center;
    }

    .title-label { color: var(--gold-armor); font-family: 'Cinzel Decorative', serif; font-size: 11px; letter-spacing: 3px; }

    /* =============================================
       ADVENTURE LOG
    ============================================= */
    .terminal-body {
      flex: 1; display: flex; flex-direction: column;
      padding: 40px; overflow-y: auto;
      font-family: 'Orbitron', sans-serif; font-size: 14px;
      line-height: 2; color: var(--starlight);
      scrollbar-width: none;
    }

    .narrative { margin-bottom: 20px; color: rgba(242, 246, 255, 0.85); }
    .speaker-label { color: var(--gold-armor); font-family: 'Cinzel Decorative', serif; margin-right: 10px; font-weight: bold; }
    .dialog { color: var(--lilac-pulse); text-shadow: 0 0 5px rgba(192, 140, 207, 0.5); margin-bottom: 20px; font-style: italic; }
    .alert { color: var(--alert-red); text-shadow: 0 0 8px var(--alert-red); font-weight: bold; }

    /* CHOICE BUTTONS */
    #choices {
      margin-top: auto; display: flex; justify-content: center; gap: 20px; opacity: 0;
      transition: opacity 1s ease;
    }
    .choice-btn {
      background: var(--bg-black); border: 1px solid var(--gold-armor);
      color: var(--gold-armor); padding: 12px 24px; font-family: 'Orbitron', sans-serif;
      font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s;
      letter-spacing: 2px;
    }
    .choice-btn:hover { 
      border-color: var(--lilac-pulse); color: var(--starlight);
      box-shadow: 0 0 20px var(--lilac-pulse);
    }

    .crt-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 5; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px); opacity: 0.2; }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="terminal-window">
    <div class="title-bar">
      <span class="title-label">MIRRORGATE LOG // ARRIVAL HUB</span>
    </div>

    <div class="terminal-body">
      <div class="crt-overlay"></div>
      <div id="story-log"></div>
      <div id="choices">
        <button class="choice-btn" onclick="takeWeapon('sword')">[ GRAB SWORD ]</button>
        <button class="choice-btn" onclick="takeWeapon('shield')">[ GRAB SHIELD ]</button>
      </div>
    </div>
  </div>

  <script>
    const log = document.getElementById('story-log');
    const choiceContainer = document.getElementById('choices');

    const storyLines = [
      { type: 'narrative', text: "You step through the Mirrorgate. The air is cool and smells of ozone. The hub looks familiar—the same obsidian floors, the same drifting stars—but something is... off. The lilac glows are too sharp. The shadows too long." },
      { type: 'narrative', text: "A Guard in high-gloss armor slides into your path. He doesn't offer a hand. Instead, he raises a scanner that pulses with a cold light." },
      { type: 'dialog', speaker: "GUARD", text: "\"Halt. Inso-Signature scan initiated...\"" },
      { type: 'alert', text: ">> [ERROR] : INSO-SIGNATURE UNRECOGNIZED. UNKNOWN ENTITY DETECTED." },
      { type: 'dialog', speaker: "GUARD", text: "\"You aren't in the archives, traveler. And the Vanguard has no room for ghosts.\"" },
      { type: 'narrative', text: "The Guard's eyes turn cold. He levels his spear at your chest. Behind him, two more sentinels begin to draw their blades. They aren't talking anymore." },
      { type: 'narrative', text: "You scan the floor for a defense. Two relics lie discarded on a nearby equipment rack..." }
    ];

    let currentLine = 0;

    function typeLine() {
      if (currentLine < storyLines.length) {
        const data = storyLines[currentLine];
        const lineDiv = document.createElement('div');
        lineDiv.className = data.type;

        if (data.speaker) {
          const speaker = document.createElement('span');
          speaker.className = 'speaker-label';
          speaker.textContent = data.speaker + ":";
          lineDiv.appendChild(speaker);
        }

        const textSpan = document.createElement('span');
        lineDiv.appendChild(textSpan);
        log.appendChild(lineDiv);

        let charIdx = 0;
        function typeChar() {
          if (charIdx < data.text.length) {
            textSpan.textContent += data.text[charIdx];
            charIdx++;
            setTimeout(typeChar, 30);
          } else {
            currentLine++;
            setTimeout(typeLine, 800);
          }
        }
        typeChar();
      } else {
        choiceContainer.style.opacity = '1';
      }
    }

    function takeWeapon(type) {
        // Star flare flash logic would go here
        window.location.href = 'combat.html?weapon=' + type;
    }

    // STAR ENGINE
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    let stars = Array.from({ length: 45 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2 }));
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(192, 140, 207, 0.35)";
      stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill(); s.y -= 0.1; if (s.y < 0) s.y = canvas.height; });
      requestAnimationFrame(animate);
    }
    animate();
    window.onload = typeLine;
  </script>
</body>
</html>
