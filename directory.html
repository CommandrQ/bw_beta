<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk | Tactical Map</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-black: #0A0A0A;
      --navy-depth: #0A2540;
      --gold-armor: #C9A23E;
      --starlight: #F2F6FF;
      --active-green: #00ff41;
      --map-grid: rgba(201, 162, 62, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-depth) 0%, var(--bg-black) 100%);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Orbitron', sans-serif;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* TERMINAL WINDOW */
    .terminal-window {
      position: relative; z-index: 10;
      width: min(1000px, 96vw); height: min(700px, 85vh); 
      background-color: rgba(10, 10, 10, 0.95);
      border: 2px solid var(--gold-armor);
      border-radius: 6px;
      display: flex; flex-direction: column;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    }

    .terminal-header {
      height: 35px; background: #1a1a1a;
      border-bottom: 2px solid var(--gold-armor);
      display: flex; align-items: center; padding: 0 15px;
      justify-content: space-between;
    }

    .header-title { color: var(--gold-armor); font-size: 10px; letter-spacing: 2px; }

    /* 3D MAP VIEWPORT */
    .map-viewport {
      flex: 1;
      perspective: 1200px; /* Gives the 3D depth */
      overflow: hidden;
      display: flex; justify-content: center; align-items: center;
      background: radial-gradient(circle, #111 0%, #000 100%);
      position: relative;
    }

    .map-floor {
      width: 800px; height: 800px;
      background-image: 
        linear-gradient(var(--map-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--map-grid) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: rotateX(60deg) rotateZ(-25deg);
      transition: transform 0.5s ease;
      position: relative;
      border: 2px solid var(--map-grid);
    }

    /* MAP MARKERS */
    .location-node {
      position: absolute;
      width: 20px; height: 20px;
      background: var(--active-green);
      transform: rotateZ(25deg) rotateX(-60deg); /* Counter-rotate to stand upright */
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .node-label {
      position: absolute; top: -30px; left: 50%;
      transform: translateX(-50%);
      color: var(--active-green); font-size: 12px;
      white-space: nowrap; text-shadow: 0 0 10px var(--active-green);
    }

    .node-pin {
      width: 4px; height: 40px;
      background: var(--active-green);
      position: absolute; bottom: 0; left: 8px;
      transform-origin: bottom;
      box-shadow: 0 0 15px var(--active-green);
    }

    /* PULSE EFFECT */
    .pulse {
      position: absolute; width: 100%; height: 100%;
      border: 2px solid var(--active-green); border-radius: 50%;
      animation: mapPulse 2s infinite;
    }

    @keyframes mapPulse {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(4); opacity: 0; }
    }

    /* INFO PANEL */
    #info-panel {
      position: absolute; bottom: 20px; left: 20px;
      border-left: 3px solid var(--gold-armor);
      padding: 10px 20px; color: var(--starlight);
      background: rgba(0,0,0,0.7); pointer-events: none;
    }

    footer {
      position: absolute; bottom: 15px; width: 100%;
      text-align: center; color: var(--starlight);
      font-size: 10px; letter-spacing: 2px; opacity: 0.5;
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="terminal-window">
    <div class="terminal-header">
      <div class="header-title">FORT TOWARD // TACTICAL FLOOR MAP</div>
      <div class="header-title" id="coords">X: 00 Y: 00</div>
    </div>

    <div class="map-viewport" id="viewport">
      <div class="map-floor" id="floor">
        
        <div class="location-node" style="top: 300px; left: 400px;" onclick="updateInfo('NATION A', 'Primary Forward Operating Base. Defense Level: Max.')">
          <div class="node-pin"></div>
          <div class="pulse"></div>
          <div class="node-label">NATION A</div>
        </div>

      </div>

      <div id="info-panel">
        <div style="font-size: 10px; color: var(--gold-armor);">SELECTED SECTOR</div>
        <div id="sector-name" style="font-size: 18px;">STANDBY</div>
        <div id="sector-desc" style="font-size: 11px; font-family: 'Inter'; margin-top: 5px;">Awaiting location selection...</div>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 Powered by Vanguard Citizen Services</footer>

  <script>
    // STAR ENGINE (Background)
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    let stars = Array.from({ length: 40 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2 }));
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(242, 246, 255, 0.2)";
      stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill(); s.y -= 0.1; if (s.y < 0) s.y = canvas.height; });
      requestAnimationFrame(animate);
    }
    animate();

    // INTERACTIVE MAP LOGIC
    const floor = document.getElementById('floor');
    const coordDisplay = document.getElementById('coords');

    function updateInfo(name, desc) {
      document.getElementById('sector-name').innerText = name;
      document.getElementById('sector-desc').innerText = desc;
    }

    // Interactive Tilt/Rotate based on mouse movement
    document.addEventListener('mousemove', (e) => {
      const xPercent = (e.clientX / window.innerWidth - 0.5) * 20;
      const yPercent = (e.clientY / window.innerHeight - 0.5) * 10;
      
      floor.style.transform = `rotateX(${60 + yPercent}deg) rotateZ(${-25 + xPercent}deg)`;
      
      // Update fake coords
      const xVal = Math.floor(Math.abs(xPercent * 5));
      const yVal = Math.floor(Math.abs(yPercent * 8));
      coordDisplay.innerText = `X: ${xVal.toString().padStart(2, '0')} Y: ${yVal.toString().padStart(2, '0')}`;
    });
  </script>
</body>
</html>
