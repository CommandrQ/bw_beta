<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Terminal</title>
    <style>
        :root {
            --gold: #c5a059;
            --neon-blue: #00f2ff;
            --dark-bg: #0a0b10;
            --glass: rgba(0, 242, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Add a fantasy background image here if desired */
            background: radial-gradient(circle, #1a1c2c 0%, #0a0b10 100%);
        }

        /* The Menu Container */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
            padding: 40px;
            border-left: 2px solid var(--gold);
            position: relative;
        }

        /* Decorative "Futuristic Shield" Border */
        .main-menu::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 1px solid rgba(197, 160, 89, 0.2);
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%);
            background: var(--glass);
            z-index: -1;
        }

        .menu-title {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
        }

        /* Menu Button Styling */
        .menu-option {
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            padding: 10px 20px;
            transition: all 0.3s ease;
            position: relative;
            display: block;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .menu-option:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.1);
            border-left: 5px solid var(--neon-blue);
            transform: translateX(10px);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* "Active" or Interactive scan-line effect */
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--neon-blue);
            opacity: 0.3;
            top: 0;
            animation: move 4s linear infinite;
        }

        @keyframes move {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-menu">
        <div class="scanline"></div>
        <div class="menu-title">Main Interface</div>
        
        <div class="menu-options">
            <a href="#" class="menu-option">Enter the Realm</a>
            <a href="#" class="menu-option">The Reserves</a>
            <a href="#" class="menu-option">The Ruins</a>
            <a href="https://support.vcscentral.com/" class="menu-option">Help</a>
            <a href="#" class="menu-option">Exit System</a>
        </div>
    </div>

</body>
</html>
