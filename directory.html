<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCS Central</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.6);
            --neon-blue: #00f2ff;
            --dark-bg: #020305; 
            --solid-menu: #0d0f14;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            position: relative;
        }

        /* --- Traveling & Twinkling Background Stars --- */
        .star-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            z-index: -2;
            background: 
                radial-gradient(3px 3px at 15% 15%, #fff, transparent),
                radial-gradient(5px 5px at 45% 65%, #fff, transparent),
                radial-gradient(2px 2px at 75% 25%, #fff, transparent),
                radial-gradient(6px 6px at 85% 85%, rgba(255,255,255,0.9), transparent);
            background-size: 800px 800px;
            animation: starTravel 70s linear infinite, twinkle 6s ease-in-out infinite alternate;
        }

        /* --- Shooting Star (Comet) --- */
        .shooting-star {
            position: absolute;
            top: -10px;
            left: 50%;
            width: 2px;
            height: 2px;
            background: #fff;
            z-index: -1;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 15px 2px #fff, 0 0 30px 5px var(--neon-blue);
            animation: comet 10s linear infinite;
        }

        @keyframes comet {
            0% { transform: translate(50vw, 0) rotate(-45deg) scale(0); opacity: 0; }
            5% { opacity: 1; transform: translate(40vw, 10vh) rotate(-45deg) scale(1); }
            15% { opacity: 0; transform: translate(-10vw, 60vh) rotate(-45deg) scale(0); }
            100% { opacity: 0; }
        }

        @keyframes starTravel {
            from { transform: translateY(-50%); }
            to { transform: translateY(0%); }
        }

        @keyframes twinkle {
            0% { opacity: 0.3; filter: drop-shadow(0 0 2px #fff); }
            100% { opacity: 1; filter: drop-shadow(0 0 15px #fff); }
        }

        /* --- Main Menu Interface --- */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: clamp(300px, 40vw, 550px); 
            max-height: 80vh;
            padding: clamp(20px, 4vh, 50px);
            border-left: 3px solid var(--gold);
            position: relative;
            z-index: 1;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .main-menu::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--solid-menu); 
            clip-path: polygon(0% 0%, 100% 0%, 100% 88%, 88% 100%, 0% 100%);
            border: 1px solid rgba(197, 160, 89, 0.2);
            z-index: -1;
        }

        .menu-title {
            font-size: clamp(0.9rem, 1.1vw, 1.2rem);
            letter-spacing: 0.5em;
            color: var(--gold);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 5px var(--gold-glow); opacity: 0.8; }
            50% { text-shadow: 0 0 15px var(--gold), 0 0 25px var(--gold-glow); transform: scale(1.02); opacity: 1; }
        }

        .menu-option {
            text-decoration: none;
            color: #ccc;
            font-size: clamp(1.1rem, 1.7vw, 1.8rem); 
            padding: 12px 20px;
            transition: all 0.3s ease-out;
            display: block;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .menu-option:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--neon-blue);
            transform: translateX(10px);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- Footer --- */
        .vanguard-footer {
            margin-top: 30px;
            color: white;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="star-field"></div>
    <div class="shooting-star"></div>

    <div class="main-menu">
        <div class="menu-title">Main Menu</div>
        <div class="menu-options">
            <a href="https://support.vcscentral.com/" class="menu-option">Help Center</a>
        </div>
    </div>

    <footer class="vanguard-footer">
        © 2026 VANGUARD CITIZEN SERVICES
    </footer>

</body>
</html>
