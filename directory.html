<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Tactical | Fort Toward</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #050505;
      --grid-green: #0a2f0a;
      --map-blue: #2040c0;
      --map-border: #ffffff;
      --map-green: #30a060;
      --text-main: #ffffff;
      --highlight: #f03030;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      background: var(--bg-dark);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
    }

    /* THE PIXEL GRID BACKGROUND */
    .screen-container {
      position: relative;
      width: 900px; height: 600px;
      background-color: var(--bg-dark);
      background-image: 
        linear-gradient(var(--grid-green) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-green) 1px, transparent 1px);
      background-size: 20px 20px;
      border: 4px solid #333;
      display: flex; flex-direction: column;
      image-rendering: pixelated; /* Keeps things crunchy */
    }

    /* HEADER */
    .header {
      padding: 15px; border-bottom: 4px solid #333;
      display: flex; justify-content: space-between;
      color: var(--text-main); font-size: 10px; letter-spacing: 2px;
    }

    /* 3D PERSPECTIVE WRAPPER */
    .map-viewport {
      flex: 1; perspective: 1000px;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
    }

    .map-container {
      position: relative;
      width: 600px; height: 400px;
      transform: rotateX(45deg) rotateZ(-10deg);
      transform-style: preserve-3d;
      transition: transform 0.2s ease-out;
    }

    /* PIXEL ROOM BLOCKS */
    .room {
      position: absolute;
      background: var(--map-blue);
      border: 2px solid var(--map-border);
      box-shadow: inset -4px -4px 0px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: background 0.2s;
    }

    .room:hover { background: var(--map-green); }

    .room.active {
      background: var(--highlight);
      animation: flash 0.5s infinite;
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* UI OVERLAYS */
    .labels {
      position: absolute; left: 20px; bottom: 20px;
      color: var(--text-main); font-size: 8px; line-height: 2;
    }

    .info-box {
      position: absolute; right: 20px; bottom: 20px;
      width: 250px; background: rgba(0,0,0,0.8);
      border: 2px solid var(--map-border); padding: 10px;
      color: var(--text-main); font-size: 8px;
    }

    footer {
      position: absolute; bottom: -30px; width: 100%; text-align: center;
      color: #555; font-size: 8px; font-family: sans-serif;
    }
  </style>
</head>
<body>

  <div class="screen-container">
    <div class="header">
      <span>FORT TOWARD MAP</span>
      <span id="coord-readout">X:00 Y:00</span>
    </div>

    <div class="map-viewport" id="viewport">
      <div class="map-container" id="map">
        
        <div class="room active" style="width: 80px; height: 40px; top: 180px; left: 240px;" 
             onclick="showInfo('NATION A', 'VANGUARD HUB. STATUS: SECURE.')"></div>
        
        <div class="room" style="width: 120px; height: 20px; top: 190px; left: 320px;"
             onclick="showInfo('EAST WING', 'RESIDENTIAL QUARTERS.')"></div>
        
        <div class="room" style="width: 20px; height: 100px; top: 80px; left: 270px;"
             onclick="showInfo('NORTH PASS', 'UNCHARTERED SECTOR.')"></div>

        <div class="room" style="width: 60px; height: 60px; top: 20px; left: 250px;"
             onclick="showInfo('FORT TOP', 'COMMUNICATIONS ARRAY.')"></div>

        <div class="room" style="width: 40px; height: 40px; top: 250px; left: 260px; background: #6a329f;"
             onclick="showInfo('THE RUINS', 'RECLAIMED GRAVEYARD SECTOR.')"></div>
      </div>
    </div>

    <div class="labels">
      <div>> DATA LOADED</div>
      <div>> TARGET: NATION A</div>
    </div>

    <div class="info-box">
      <div id="info-title" style="color: var(--highlight); margin-bottom: 5px;">SELECT SECTOR</div>
      <div id="info-body">AWAITING INPUT...</div>
    </div>
  </div>

  <footer>&copy; 2026 Powered by Vanguard Citizen Services</footer>

  <script>
    const map = document.getElementById('map');
    const coordReadout = document.getElementById('coord-readout');

    function showInfo(title, text) {
      document.getElementById('info-title').innerText = title;
      document.getElementById('info-body').innerText = text;
    }

    // Dynamic 3D tilt
    window.addEventListener('mousemove', (e) => {
      const xRotate = (e.clientY / window.innerHeight - 0.5) * 30 + 45;
      const zRotate = (e.clientX / window.innerWidth - 0.5) * 30 - 10;
      map.style.transform = `rotateX(${xRotate}deg) rotateZ(${zRotate}deg)`;

      // Update pixel coords
      const pxX = Math.floor(e.clientX / 20);
      const pxY = Math.floor(e.clientY / 20);
      coordReadout.innerText = `X:${pxX} Y:${pxY}`;
    });
  </script>
</body>
</html>
