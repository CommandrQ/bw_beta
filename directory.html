<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS Central</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.6);
            --neon-blue: #00f2ff;
            --dark-bg: #030408; 
            --solid-menu: #0d0f14;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            
            /* Background starfield - visible only outside the menu */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 3px),
                radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
        }

        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
            padding: 40px;
            border-left: 3px solid var(--gold);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Solid backing to hide stars behind the menu */
        .main-menu::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 1px solid rgba(197, 160, 89, 0.3);
            background: var(--solid-menu); 
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%);
            z-index: -1;
        }

        /* Pulsing Title */
        .menu-title {
            font-size: 1rem;
            letter-spacing: 5px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.4);
            padding-bottom: 12px;
            font-weight: bold;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% {
                text-shadow: 0 0 5px var(--gold-glow);
                border-bottom-color: rgba(197, 160, 89, 0.4);
            }
            50% {
                text-shadow: 0 0 20px var(--gold), 0 0 30px var(--gold-glow);
                border-bottom-color: var(--gold);
                transform: scale(1.02);
            }
            100% {
                text-shadow: 0 0 5px var(--gold-glow);
                border-bottom-color: rgba(197, 160, 89, 0.4);
            }
        }

        .menu-option {
            text-decoration: none;
            color: #b0b0b0;
            font-size: 1.4rem;
            padding: 12px 20px;
            transition: all 0.25s ease-out;
            display: block;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .menu-option:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--neon-blue);
            transform: translateX(8px);
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="main-menu">
        <div class="menu-title">Interface Linked</div>
        
        <div class="menu-options">
            <a href="#" class="menu-option">Enter the Realm</a>
            <a href="#" class="menu-option">The Reserves</a>
            <a href="#" class="menu-option">The Ruins</a>
            <a href="https://support.vcscentral.com/" class="menu-option">Help</a>
            <a href="#" class="menu-option">Exit System</a>
        </div>
    </div>

</body>
</html>
