<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Fort Toward | Tactical HUD</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #050505;
      --grid-green: #0a2f0a;
      --castle-blue: #2040c0;
      --castle-border: #ffffff;
      --hut-green: #30a060;
      --gold: #C9A23E;
      --highlight: #f03030;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

    body {
      width: 100%; height: 100vh;
      background: var(--bg-dark);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden; color: #fff;
    }

    /* SCANLINE EFFECT */
    body::after {
      content: " "; position: fixed; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100;
    }

    .screen-container {
      position: relative; width: 100vw; height: 100vh;
      background-image: linear-gradient(var(--grid-green) 1px, transparent 1px), linear-gradient(90deg, var(--grid-green) 1px, transparent 1px);
      background-size: 40px 40px; display: flex; flex-direction: column;
    }

    .header {
      padding: 10px; border-bottom: 2px solid var(--gold);
      background: rgba(0,0,0,0.9); display: flex; justify-content: space-between;
      font-size: 8px; z-index: 20;
    }

    /* 3D VIEWPORT */
    .viewport {
      flex: 1; perspective: 1200px;
      display: flex; justify-content: center; align-items: center;
    }

    .world {
      position: relative; width: 400px; height: 400px;
      transform-style: preserve-3d;
      transform: scale(1.2) rotateX(60deg) rotateZ(-30deg);
      transition: transform 0.1s ease-out;
    }

    /* BOX MAKER HELPER */
    .box {
      position: absolute; transform-style: preserve-3d;
      background: var(--castle-blue); border: 2px solid var(--castle-border);
      image-rendering: pixelated;
    }

    /* CASTLE COMPONENTS */
    .castle-wall { width: 200px; height: 200px; top: 100px; left: 100px; border: 4px solid #fff; }
    
    .tower {
      width: 60px; height: 60px; background: var(--castle-blue);
      border: 3px solid #fff; position: absolute;
      transform: translateZ(60px); display: flex; align-items: center; justify-content: center; font-size: 6px;
    }

    /* THE HUT (CITIZENS SUPPORT) */
    .hut {
      width: 50px; height: 40px; background: var(--hut-green);
      border: 2px solid #fff; position: absolute;
      top: 320px; left: 175px; /* Positioned outside the "castle" square */
      transform: translateZ(10px);
    }

    .tag {
      position: absolute; top: -15px; left: 0; background: var(--gold);
      color: #000; font-size: 5px; padding: 2px; white-space: nowrap;
    }

    /* VANGUARD SERVICE (IN THE KEEP) */
    .vanguard-keep {
      width: 80px; height: 80px; top: 160px; left: 160px;
      background: var(--castle-blue); border: 2px solid var(--gold);
      transform: translateZ(30px); text-align: center; padding-top: 10px; font-size: 6px;
    }

    .info-overlay {
      position: absolute; bottom: 0; width: 100%;
      background: rgba(0,0,0,0.9); border-top: 2px solid var(--gold);
      padding: 15px; font-size: 8px; z-index: 20;
    }
  </style>
</head>
<body>

  <div class="screen-container">
    <div class="header">
      <span>FORT TOWARD // CASTLE SECTOR</span>
      <span id="coord">X:00 Y:00</span>
    </div>

    <div class="viewport" id="v">
      <div class="world" id="world">
        
        <div class="castle-wall"></div>

        <div class="hut" onclick="update('CITIZENS SUPPORT', 'OUTSIDE WALLS. HUB FOR NEW ARRIVALS.')">
          <div class="tag">OPENING SOON</div>
          <span style="font-size: 5px;">HUT</span>
        </div>

        <div class="vanguard-keep" onclick="update('VANGUARD SERVICES', 'MAIN KEEP. CENTRAL ADMINISTRATION.')">
          VANGUARD<br>SERVICES
        </div>

        <div class="tower" style="top: 80px; left: 80px;">T1</div>
        <div class="tower" style="top: 80px; left: 260px;">T2</div>
        <div class="tower" style="top: 260px; left: 80px;">T3</div>
        <div class="tower" style="top: 260px; left: 260px;">T4</div>

      </div>
    </div>

    <div class="info-overlay">
      <div id="t" style="color: var(--gold); margin-bottom: 5px;">TACTICAL SCAN</div>
      <div id="d">SELECT LOCATION FOR DATA...</div>
    </div>
  </div>

  <script>
    const world = document.getElementById('world');
    let zoom = 1.2;
    let rX = 60;
    let rZ = -30;

    function update(t, d) {
      document.getElementById('t').innerText = t;
      document.getElementById('d').innerText = d;
    }

    // Touch & Mouse Control
    let dragging = false, sX, sY;

    const start = (e) => {
      dragging = true;
      sX = e.pageX || e.touches[0].pageX;
      sY = e.pageY || e.touches[0].pageY;
    };

    const move = (e) => {
      if (!dragging) return;
      const x = e.pageX || e.touches[0].pageX;
      const y = e.pageY || e.touches[0].pageY;
      
      rZ += (x - sX) * 0.5;
      rX -= (y - sY) * 0.5;
      
      sX = x; sY = y;
      world.style.transform = `scale(${zoom}) rotateX(${rX}deg) rotateZ(${rZ}deg)`;
      document.getElementById('coord').innerText = `X:${Math.floor(x/10)} Y:${Math.floor(y/10)}`;
    };

    window.addEventListener('mousedown', start);
    window.addEventListener('touchstart', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move);
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('touchend', () => dragging = false);

    // Mouse Wheel Zoom
    window.addEventListener('wheel', (e) => {
      zoom += e.deltaY * -0.001;
      zoom = Math.min(Math.max(0.5, zoom), 3);
      world.style.transform = `scale(${zoom}) rotateX(${rX}deg) rotateZ(${rZ}deg)`;
    });
  </script>
</body>
</html>
