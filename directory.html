<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Vanguard Tactical | Flat Map</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #050505;
      --grid-green: #0a2f0a;
      --map-blue: #2040c0;
      --map-green: #30a060;
      --map-border: #ffffff;
      --gold: #C9A23E;
      --highlight: #f03030;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

    body {
      width: 100%; height: 100vh;
      background: var(--bg-dark);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden; color: #fff;
    }

    /* THE PIXEL SCREEN */
    .screen-container {
      position: relative; width: 100vw; height: 100vh;
      background-image: 
        linear-gradient(var(--grid-green) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-green) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex; flex-direction: column;
      image-rendering: pixelated;
    }

    .header {
      padding: 12px; border-bottom: 2px solid var(--gold);
      background: rgba(0,0,0,0.9); display: flex; justify-content: space-between;
      font-size: 8px; z-index: 50;
    }

    /* PAN & ZOOM VIEWPORT */
    .viewport {
      flex: 1; position: relative; overflow: hidden;
      cursor: grab; display: flex; align-items: center; justify-content: center;
    }

    .map-layer {
      position: absolute; width: 2000px; height: 2000px;
      transform-origin: center; transition: transform 0.1s ease-out;
    }

    /* PIXEL ASSETS */
    .room {
      position: absolute; background: var(--map-blue);
      border: 2px solid var(--map-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 6px; text-align: center;
    }

    /* THE BIG CASTLE (Flat block structure) */
    .castle-outer { width: 144px; height: 144px; top: 928px; left: 928px; background: transparent; border: 4px solid var(--map-border); }
    .castle-keep { width: 48px; height: 48px; top: 976px; left: 976px; border: 2px solid var(--gold); }
    
    /* THE HUT (Citizens Support - Outside) */
    .hut { 
      width: 24px; height: 24px; background: var(--map-green); 
      top: 1096px; left: 988px; /* Positioned just outside the southern castle wall */
    }

    .tag {
      position: absolute; top: -12px; background: var(--gold);
      color: #000; font-size: 4px; padding: 1px 3px; white-space: nowrap;
    }

    /* INDICATORS */
    .flash { animation: flash-anim 0.8s infinite; }
    @keyframes flash-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .info-bar {
      position: absolute; bottom: 0; width: 100%;
      background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold);
      padding: 15px; font-size: 8px; z-index: 50;
    }
  </style>
</head>
<body>

  <div class="screen-container">
    <div class="header">
      <span>FORT TOWARD // SECTOR: NATION A</span>
      <span id="coord">X:00 Y:00</span>
    </div>

    <div class="viewport" id="v">
      <div class="map-layer" id="map">
        
        <div class="room" style="width: 240px; height: 12px; top: 994px; left: 800px;"></div>
        <div class="room" style="width: 12px; height: 240px; top: 880px; left: 994px;"></div>

        <div class="castle-outer" onclick="ui('FORT TOWARD', 'MAIN DEFENSIVE PERIMETER.')"></div>
        
        <div class="room castle-keep flash" onclick="ui('VANGUARD SERVICES', 'MAIN ADMINISTRATION HUB.')">
          VCS
        </div>

        <div class="room hut" onclick="ui('CITIZENS SUPPORT', 'OUTSIDE GATES. OPENING SOON.')">
          <div class="tag">COMING SOON</div>
          HUT
        </div>

      </div>
    </div>

    <div class="info-bar">
      <div id="t" style="color: var(--gold); margin-bottom: 5px;">DATA TERMINAL</div>
      <div id="d">TAP SECTOR TO ANALYZE...</div>
    </div>
  </div>

  <script>
    const map = document.getElementById('map');
    let scale = 2.5; // Initial zoom on base
    let posX = 0, posY = 0;

    function ui(t, d) {
      document.getElementById('t').innerText = t;
      document.getElementById('d').innerText = d;
    }

    // PAN & ZOOM LOGIC
    let isDown = false, startX, startY;

    const onStart = (e) => {
      isDown = true;
      startX = (e.pageX || e.touches[0].pageX) - posX;
      startY = (e.pageY || e.touches[0].pageY) - posY;
      document.getElementById('v').style.cursor = 'grabbing';
    };

    const onMove = (e) => {
      if (!isDown) return;
      posX = (e.pageX || e.touches[0].pageX) - startX;
      posY = (e.pageY || e.touches[0].pageY) - startY;
      render();
      
      const xHUD = Math.floor(Math.abs(posX/10));
      const yHUD = Math.floor(Math.abs(posY/10));
      document.getElementById('coord').innerText = `X:${xHUD} Y:${yHUD}`;
    };

    const onEnd = () => {
      isDown = false;
      document.getElementById('v').style.cursor = 'grab';
    };

    window.addEventListener('mousedown', onStart);
    window.addEventListener('touchstart', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);

    window.addEventListener('wheel', (e) => {
      scale += e.deltaY * -0.002;
      scale = Math.min(Math.max(0.5, scale), 6);
      render();
    });

    function render() {
      map.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    // Center map initially
    render();
  </script>
</body>
</html>
