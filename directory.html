<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCS Central</title>
    <style>
        :root {
            --gold: #c5a059;
            --firefly-yellow: #ffdf5d;
            --firefly-glow: rgba(255, 223, 93, 0.6);
            --neon-blue: #00f2ff;
            --dark-bg: #05070a; 
            --solid-menu: #0d1117;
        }

        /* --- Strict Layout Control --- */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            position: relative;
        }

        /* --- Firefly Background Container --- */
        .firefly-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        /* Generating Fireflies with CSS Gradients */
        .firefly-field {
            position: absolute;
            bottom: -500px;
            left: 0;
            width: 100%;
            height: calc(100% + 1000px);
            background-image: 
                radial-gradient(4px 4px at 10% 10%, var(--firefly-yellow), transparent),
                radial-gradient(6px 6px at 30% 50%, var(--firefly-yellow), transparent),
                radial-gradient(3px 3px at 50% 20%, var(--firefly-yellow), transparent),
                radial-gradient(5px 5px at 70% 80%, var(--firefly-yellow), transparent),
                radial-gradient(4px 4px at 90% 40%, var(--firefly-yellow), transparent),
                radial-gradient(7px 7px at 15% 75%, var(--firefly-yellow), transparent);
            background-size: 800px 800px;
            animation: fireflyRise 25s linear infinite, fireflyFlicker 3s ease-in-out infinite alternate;
        }

        /* --- Animations --- */
        @keyframes fireflyRise {
            from { transform: translateY(0); }
            to { transform: translateY(-800px); } /* Rise upward */
        }

        @keyframes fireflyFlicker {
            0% { 
                opacity: 0.2; 
                filter: blur(1px) drop-shadow(0 0 5px var(--firefly-yellow));
            }
            100% { 
                opacity: 0.9; 
                filter: blur(2px) drop-shadow(0 0 15px var(--firefly-yellow));
            }
        }

        /* --- Main Menu Interface --- */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: clamp(320px, 42vw, 550px); 
            max-height: 80vh;
            padding: clamp(25px, 4vh, 50px);
            border-left: 3px solid var(--gold);
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .main-menu::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--solid-menu); 
            clip-path: polygon(0% 0%, 100% 0%, 100% 88%, 88% 100%, 0% 100%);
            border: 1px solid rgba(197, 160, 89, 0.2);
            z-index: -1;
        }

        .menu-title {
            font-size: clamp(0.9rem, 1.1vw, 1.2rem);
            letter-spacing: 0.5em;
            color: var(--gold);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 5px rgba(197, 160, 89, 0.6); opacity: 0.8; }
            50% { text-shadow: 0 0 15px var(--gold), 0 0 25px rgba(197, 160, 89, 0.6); transform: scale(1.02); opacity: 1; }
        }

        .menu-option {
            text-decoration: none;
            color: #ccc;
            font-size: clamp(1.1rem, 1.7vw, 1.8rem); 
            padding: 12px 20px;
            transition: all 0.3s ease-out;
            display: block;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .menu-option:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--neon-blue);
            transform: translateX(10px);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- Footer --- */
        .vanguard-footer {
            margin-top: 30px;
            color: white;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="firefly-container">
        <div class="firefly-field"></div>
    </div>

    <div class="main-menu">
        <div class="menu-title">Main Menu</div>
        <div class="menu-options">
            <a href="https://support.vcscentral.com/" class="menu-option">Help Center</a>
        </div>
    </div>

    <footer class="vanguard-footer">
        © 2026 VANGUARD CITIZEN SERVICES
    </footer>

</body>
</html>
