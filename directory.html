<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reserves - Menu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Dark background for white text contrast */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        .menu-container {
            text-align: center;
            background: #252525;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        h1 {
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
            color: #aaaaaa;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            margin: 15px 0;
        }

        /* The requested white text styling */
        .menu-link {
            color: #FFFFFF !important;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 500;
            display: inline-block;
            padding: 10px 20px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .menu-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            border: 1px solid #ffffff;
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Project Dashboard</h1>
        <ul class="menu-list">
            <li class="menu-item">
                <a href="#" class="menu-link">Support Center</a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link">Worldbuilding Project</a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link">Story Mode</a>
            </li>
        </ul>
        <div class="footer-note">
            Managing The Reserves & The Ruins
        </div>
    </div>

</body>
</html>
