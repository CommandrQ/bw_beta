<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VCS Central</title>
    <style>
        :root {
            --gold: #c5a059;
            --firefly: #ffdf5d;
            --neon-blue: #00f2ff;
            --dark-bg: #05070a; 
            --solid-menu: #0d1117;
        }

        /* --- Full-Screen Lockdown --- */
        html, body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }

        /* --- The Firefly Layer --- */
        /* We use 'before' on the body to ensure it is always the bottom-most layer */
        body::before {
            content: "";
            position: fixed;
            top: -100px;
            left: 0;
            right: 0;
            bottom: -100px;
            z-index: 0;
            pointer-events: none;
            
            /* Creating yellow dots of different sizes */
            background-image: 
                radial-gradient(4px 4px at 10% 20%, var(--firefly), transparent),
                radial-gradient(6px 6px at 40% 50%, var(--firefly), transparent),
                radial-gradient(3px 3px at 80% 30%, var(--firefly), transparent),
                radial-gradient(5px 5px at 20% 80%, var(--firefly), transparent),
                radial-gradient(4px 4px at 60% 90%, var(--firefly), transparent),
                radial-gradient(7px 7px at 90% 10%, var(--firefly), transparent);
            background-size: 600px 600px; /* This repeats the pattern */
            
            /* Two animations: One to move them up, one to flicker */
            animation: rise 30s linear infinite, flicker 4s ease-in-out infinite alternate;
        }

        @keyframes rise {
            from { transform: translateY(0); }
            to { transform: translateY(-600px); }
        }

        @keyframes flicker {
            0% { opacity: 0.2; filter: blur(1px) brightness(0.5); }
            100% { opacity: 1; filter: blur(2px) brightness(1.5) drop-shadow(0 0 10px var(--firefly)); }
        }

        /* --- The Menu Interface --- */
        .main-menu {
            position: relative;
            z-index: 10; /* Ensures menu is ABOVE the fireflies */
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: clamp(320px, 42vw, 550px); 
            padding: clamp(25px, 4vh, 50px);
            border-left: 3px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Solid Shield Plate */
        .main-menu::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--solid-menu); 
            clip-path: polygon(0% 0%, 100% 0%, 100% 88%, 88% 100%, 0% 100%);
            border: 1px solid rgba(197, 160, 89, 0.2);
            z-index: -1;
        }

        .menu-title {
            font-size: clamp(0.9rem, 1.1vw, 1.2rem);
            letter-spacing: 0.5em;
            color: var(--gold);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 5px var(--gold); opacity: 0.8; }
            50% { text-shadow: 0 0 20px var(--gold); transform: scale(1.02); opacity: 1; }
        }

        .menu-option {
            text-decoration: none;
            color: #ccc;
            font-size: clamp(1.1rem, 1.7vw, 1.8rem); 
            padding: 12px 20px;
            transition: all 0.3s ease-out;
            display: block;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .menu-option:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
            border-left: 3px solid var(--neon-blue);
            transform: translateX(10px);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .vanguard-footer {
            position: relative;
            z-index: 10;
            margin-top: 30px;
            color: white;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-menu">
        <div class="menu-title">Main Menu</div>
        <div class="menu-options">
            <a href="https://support.vcscentral.com/" class="menu-option">Help Center</a>
        </div>
    </div>

    <footer class="vanguard-footer">
        © 2026 VANGUARD CITIZEN SERVICES
    </footer>

</body>
</html>
