<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCS Central</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.6);
            --neon-blue: #00f2ff;
            --dark-bg: #030408; 
            --solid-menu: #0d0f14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column; /* Stack menu and footer vertically */
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Traveling Stars Animation --- */
        .star-field {
            position: absolute;
            top: -100%; /* Start above the view */
            left: 0;
            width: 100%;
            height: 200%; /* Double height for seamless loop */
            z-index: -2;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ddd, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 160px 120px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px; /* Adjust for star density */
            animation: starTravel 20s linear infinite;
        }

        @keyframes starTravel {
            from { transform: translateY(0); }
            to { transform: translateY(50%); }
        }

        /* --- Main Menu --- */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: clamp(320px, 45vw, 600px); 
            padding: clamp(30px, 4vh, 60px);
            border-left: 3px solid var(--gold);
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            margin-bottom: 40px; /* Space for the footer */
        }

        .main-menu::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--solid-menu); 
            clip-path: polygon(0% 0%, 100% 0%, 100% 88%, 88% 100%, 0% 100%);
            border: 1px solid rgba(197, 160, 89, 0.2);
            z-index: -1;
        }

        /* --- Pulsing Title --- */
        .menu-title {
            font-size: clamp(1rem, 1.2vw, 1.4rem);
            letter-spacing: 0.5em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
            font-weight: bold;
            text-align: center;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 5px var(--gold-glow); }
            50% { text-shadow: 0 0 20px var(--gold), 0 0 30px var(--gold-glow); transform: scale(1.02); }
        }

        /* --- Menu Buttons --- */
        .menu-option {
            text-decoration: none;
            color: #d0d0d0;
            font-size: clamp(1.3rem, 2vw, 2.2rem); 
            padding: 15px 25px;
            transition: all 0.3s ease-out;
            display: block;
            border-left: 4px solid transparent;
            cursor: pointer;
        }

        .menu-option:hover {
            color: var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
            border-left: 4px solid var(--neon-blue);
            transform: translateX(12px);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.8);
        }

        /* --- New Glowing Footer --- */
        .vanguard-footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            /* Glowing white effect */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.2);
            opacity: 0.7;
            position: absolute;
            bottom: 30px;
        }

        .vanguard-footer b {
            color: #fff;
            font-weight: normal;
        }

    </style>
</head>
<body>

    <div class="star-field"></div>

    <div class="main-menu">
        <div class="menu-title">Interface Linked</div>
        
        <div class="menu-options">
            
            <a href="https://support.vcscentral.com/" class="menu-option" target="_blank">Help Center</a>
          
        </div>
    </div>

    <footer class="vanguard-footer">
        © 2026 <b>Vanguard Citizen Services</b> | Secure Terminal Access
    </footer>

</body>
</html>
