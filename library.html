<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game Demo</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .board {
            width: 800px;
            background-color: #34495e;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .player-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 2px solid #7f8c8d;
            border-radius: 8px;
        }
        .stats { width: 150px; }
        .zones {
            display: flex;
            gap: 10px;
        }
        .card-zone {
            width: 80px;
            height: 110px;
            border: 2px dashed #95a5a6;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 0.8em;
            background-color: #2c3e50;
            position: relative;
        }
        .card {
            width: 100%;
            height: 100%;
            background-color: #f1c40f;
            color: #2c3e50;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: absolute;
            top: 0; left: 0;
            box-sizing: border-box;
            padding: 5px;
        }
        .card.spell { background-color: #2ecc71; }
        .card.trap { background-color: #e74c3c; }
        .card.hidden { display: none; }
        
        .deck-grave-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            width: 800px;
        }
        .log-box {
            flex-grow: 1;
            background-color: #1a252f;
            padding: 15px;
            border-radius: 8px;
            height: 150px;
            overflow-y: auto;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Turn Demo</h1>

    <div class="board">
        <div class="player-area">
            <div class="stats">
                <h3>Player 2</h3>
                <p>LP: <span id="p2-lp">8000</span></p>
            </div>
            <div class="zones">
                <div class="card-zone">
                    <div class="card" id="p2-monster">Goblin<br>1000/1000</div>
                </div>
            </div>
            <div class="deck-grave-area">
                <div class="card-zone">The Ruins<br>(<span id="p2-ruins-count">0</span>)</div>
            </div>
        </div>

        <div class="player-area">
            <div class="stats">
                <h3>Player 1</h3>
                <p>LP: 8000</p>
            </div>
            <div class="zones" style="flex-direction: column; gap: 10px;">
                <div class="zones">
                    <div class="card-zone">Monster<div class="card hidden" id="p1-monster">Aether<br><span id="aether-atk">1800</span>/1200</div></div>
                </div>
                <div class="zones">
                    <div class="card-zone">S/T<div class="card spell hidden" id="p1-spell">Surge</div></div>
                    <div class="card-zone">S/T<div class="card trap hidden" id="p1-trap">Ambush<br>(Set)</div></div>
                </div>
            </div>
            <div class="deck-grave-area">
                <div class="card-zone">The Reserves<br>(<span id="reserves-count">39</span>)</div>
                <div class="card-zone">The Ruins<br>(0)</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="next-btn" onclick="nextPhase()">Start Turn</button>
        <div class="log-box" id="log">
            <p><strong>Setup:</strong> Player 2 controls Goblin Grunt. Player 1 has Aether Knight, Surge of Power, and Ambush Pit in hand.</p>
        </div>
    </div>

    <script>
        let step = 0;
        const logBox = document.getElementById('log');
        const nextBtn = document.getElementById('next-btn');

        function addLog(text) {
            logBox.innerHTML += `<p>${text}</p>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function nextPhase() {
            step++;
            switch(step) {
                case 1:
                    document.getElementById('reserves-count').innerText = "38";
                    addLog("<strong>Draw Phase:</strong> Player 1 draws a second Aether Knight from The Reserves.");
                    nextBtn.innerText = "Next Phase";
                    break;
                case 2:
                    addLog("<strong>Standby Phase:</strong> No actions.");
                    break;
                case 3:
                    document.getElementById('p1-monster').classList.remove('hidden');
                    document.getElementById('p1-spell').classList.remove('hidden');
                    document.getElementById('p1-trap').classList.remove('hidden');
                    document.getElementById('aether-atk').innerText = "2300";
                    addLog("<strong>Main Phase 1:</strong> Player 1 summons Aether Knight. Equips Surge of Power (ATK becomes 2300). Sets Ambush Pit.");
                    break;
                case 4:
                    document.getElementById('p2-monster').classList.add('hidden');
                    document.getElementById('p2-lp').innerText = "6700";
                    document.getElementById('p2-ruins-count').innerText = "1";
                    addLog("<strong>Battle Phase:</strong> Aether Knight (2300) attacks Goblin Grunt (1000). Goblin Grunt is destroyed and sent to The Ruins. Player 2 takes 1300 damage.");
                    break;
                case 5:
                    addLog("<strong>Main Phase 2:</strong> No actions.");
                    break;
                case 6:
                    addLog("<strong>End Phase:</strong> Player 1 ends their turn.");
                    nextBtn.disabled = true;
                    nextBtn.innerText = "Turn Complete";
                    break;
            }
        }
    </script>
</body>
</html>
