<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Card Game Demo</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .board {
            width: 800px;
            background-color: #34495e;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        /* Zone Styling */
        .zone {
            width: 100px;
            height: 140px;
            border: 2px dashed #95a5a6;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            position: relative;
            transition: background-color 0.2s;
        }
        .zone.drag-over {
            background-color: #34495e;
            border-color: #f1c40f;
        }
        .zone-label {
            font-size: 0.8em;
            color: #7f8c8d;
            pointer-events: none;
        }
        .stats-display {
            position: absolute;
            bottom: -25px;
            font-size: 0.85em;
            font-weight: bold;
            color: #f1c40f;
            text-align: center;
            width: 150px;
        }

        /* Card Styling */
        .card {
            width: 90px;
            height: 130px;
            background-color: #f1c40f;
            color: #2c3e50;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: grab;
            user-select: none;
            padding: 5px;
            box-sizing: border-box;
            position: absolute;
        }
        .card:active { cursor: grabbing; }
        .card.locked { cursor: default; }
        .card.spell { background-color: #2ecc71; }
        
        /* Player Hand */
        .hand-area {
            margin-top: 40px;
            padding: 20px;
            width: 800px;
            border: 2px solid #7f8c8d;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background-color: #1a252f;
            min-height: 140px;
            position: relative;
        }
        
        /* Static Deck/Grave for visual context */
        .static-zones {
            position: absolute;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .static-zone {
            width: 80px; height: 110px;
            border: 1px solid #7f8c8d;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8em; text-align: center; color: #95a5a6;
        }
    </style>
</head>
<body>

    <h1>Interactive Field</h1>

    <div class="board">
        <div class="row">
            <div class="zone" data-allowed="monster">
                <span class="zone-label">Monster Zone</span>
                <div class="stats-display"></div>
            </div>
            <div class="zone" data-allowed="monster">
                <span class="zone-label">Monster Zone</span>
                <div class="stats-display"></div>
            </div>
        </div>

        <div class="row">
            <div class="zone" data-allowed="spell">
                <span class="zone-label">Spell/Trap Zone</span>
                <div class="stats-display"></div>
            </div>
            <div class="zone" data-allowed="spell">
                <span class="zone-label">Spell/Trap Zone</span>
                <div class="stats-display"></div>
            </div>
        </div>
        
        <div class="static-zones">
            <div class="static-zone">The Ruins<br>(0)</div>
            <div class="static-zone">The Reserves<br>(39)</div>
        </div>
    </div>

    <div class="hand-area" id="hand">
        <div class="card monster" draggable="true" id="aether" data-type="monster" data-atk="1800" data-def="1200" style="position: relative;">
            Aether Knight<br><br><small>1800 / 1200</small>
        </div>
        <div class="card spell" draggable="true" id="surge" data-type="spell" data-atk="Equip" data-def="Spell" style="position: relative;">
            Surge of Power<br><br><small>Equip</small>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        const zones = document.querySelectorAll('.zone');

        // 1. Setup Drag Start for Cards
        cards.forEach(card => {
            card.addEventListener('dragstart', (e) => {
                // Store the ID of the dragged card
                e.dataTransfer.setData('text/plain', e.target.id);
                setTimeout(() => e.target.style.opacity = '0.5', 0);
            });

            card.addEventListener('dragend', (e) => {
                e.target.style.opacity = '1';
            });
        });

        // 2. Setup Drop Zones
        zones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); // This is required to allow dropping
                zone.classList.add('drag-over');
            });

            zone.addEventListener('dragleave', () => {
                zone.classList.remove('drag-over');
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');

                const cardId = e.dataTransfer.getData('text/plain');
                const cardElement = document.getElementById(cardId);
                
                // Determine if the zone already has a card
                const hasCard = zone.querySelector('.card');

                // Check rules: Correct card type for the zone AND zone is empty
                if (cardElement.dataset.type === zone.dataset.allowed && !hasCard) {
                    
                    // Move the card into the zone
                    zone.appendChild(cardElement);
                    
                    // Lock the card so it can't be dragged again
                    cardElement.setAttribute('draggable', 'false');
                    cardElement.classList.add('locked');
                    
                    // Reset its position so it centers perfectly in the absolute container
                    cardElement.style.position = 'absolute';
                    
                    // Update the text below the zone with the card's stats
                    const statsDisplay = zone.querySelector('.stats-display');
                    const atk = cardElement.dataset.atk;
                    const def = cardElement.dataset.def;
                    
                    if (cardElement.dataset.type === 'monster') {
                        statsDisplay.innerText = `${atk} ATK / ${def} DEF`;
                    } else {
                        statsDisplay.innerText = `[ ${atk} ${def} ]`;
                    }
                }
            });
        });
    </script>
</body>
</html>
