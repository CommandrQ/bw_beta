<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldbuilding Library</title>
    <style>
        /* The Atmosphere (Background and Fonts) */
        body {
            background-color: #1a1817;
            color: #e8dcc7;
            font-family: 'Georgia', serif;
            padding: 40px;
        }

        h2 {
            border-bottom: 2px solid #e8dcc7;
            padding-bottom: 10px;
            width: fit-content;
        }

        /* The Bookshelves */
        .shelf {
            background-color: #2c1e16; /* Dark wood color */
            border-bottom: 20px solid #4a3324; /* Shelf lip */
            padding: 20px 40px 0 40px;
            display: flex;
            gap: 15px; /* Space between books */
            margin-bottom: 60px;
            border-radius: 5px;
            box-shadow: inset 0 -20px 20px -20px rgba(0,0,0,0.8);
        }

        /* The Books */
        .book {
            width: 45px;
            height: 160px;
            background-color: #7b2c2c; /* Deep red Reserve books */
            color: gold;
            writing-mode: vertical-rl; /* Turns the text sideways like a spine */
            text-align: center;
            padding: 10px 5px;
            cursor: pointer;
            border: 2px solid #111;
            border-radius: 3px 6px 6px 3px;
            box-shadow: -3px 0 5px rgba(0,0,0,0.5);
            transition: transform 0.2s; /* Smooth animation */
        }

        /* Make books hover slightly when you mouse over them */
        .book:hover {
            transform: translateY(-15px); 
        }

        /* Special style for discarded lore */
        .book.ruins {
            background-color: #4a5359; /* Dusty, faded gray */
            color: #b0b8bc;
            border-style: dashed;
        }

        /* THE MODAL (The Skyrim Pop-Up Layer) */
        .modal-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* Dim the background */
            z-index: 1000;
        }

        /* The Paper/Parchment inside the Modal */
        .modal-content {
            background-color: #f4ebd8; /* Parchment color */
            color: #2b1f18;
            width: 60%;
            max-width: 800px;
            height: 70vh; /* Takes up 70% of the screen height */
            margin: 5% auto; /* Centers it */
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 30px black;
            position: relative;
            overflow-y: auto; /* Lets you scroll if text is long */
        }

        /* The Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            color: #880000;
        }

        .close-btn:hover { color: red; }
    </style>
</head>
<body>

    <h2>The Reserves</h2>
    <div class="shelf">
        <div class="book" onclick="openCodex('The Sun King', 'The great sun king ruled for 400 years...')">The Sun King</div>
        <div class="book" onclick="openCodex('Bestiary: Vol 1', 'Here be dragons and other beasts of the mist.')">Bestiary</div>
        <div class="book" onclick="openCodex('Trade Routes', 'The spice trade collapsed in the 3rd era.')">Trade Routes</div>
    </div>

    <h2>The Ruins</h2>
    <div class="shelf">
        <div class="book ruins" onclick="openCodex('Old Magic System', 'This magic system was discarded because it was too confusing.')">Old Magic System</div>
        <div class="book ruins" onclick="openCodex('Fallen Kingdom', 'A draft of a kingdom that got written out of the main timeline.')">Fallen Kingdom</div>
    </div>

    <div class="modal-overlay" id="codexModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCodex()">×</span>
            <h1 id="codexTitle">Book Title Goes Here</h1>
            <hr>
            <p id="codexBody">Book content goes here.</p> 
        </div>
    </div>

    <script>
        // Find the modal parts in our HTML
        const modal = document.getElementById('codexModal');
        const titleElement = document.getElementById('codexTitle');
        const bodyElement = document.getElementById('codexBody');

        // Function to open the book
        function openCodex(title, content) {
            titleElement.innerText = title;
            bodyElement.innerText = content;
            modal.style.display = 'block'; // Make the modal visible
        }

        // Function to close the book
        function closeCodex() {
            modal.style.display = 'none'; // Hide the modal again
        }

        // Close the book if the user clicks the dark background outside the paper
        window.onclick = function(event) {
            if (event.target == modal) {
                closeCodex();
            }
        }
    </script>

</body>
</html>
