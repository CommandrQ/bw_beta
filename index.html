<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk | Cold Boot</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-black: #0A0A0A;
      --navy-depth: #0A2540;
      --gold-armor: #C9A23E;
      --lilac-pulse: #C08CCF;
      --starlight: #F2F6FF;
      --active-green: #00ff41;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-depth) 0%, var(--bg-black) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* =============================================
       BOOT OVERLAY
    ============================================= */
    #boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg-black);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .boot-btn {
      padding: 15px 40px;
      background: transparent;
      border: 2px solid var(--gold-armor);
      color: var(--gold-armor);
      font-family: 'Cinzel Decorative', serif;
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .boot-btn:hover {
      background: var(--gold-armor);
      color: var(--bg-black);
      box-shadow: 0 0 30px var(--gold-armor);
    }

    /* =============================================
       CRT BOOT ANIMATION (THE STRIKE)
    ============================================= */
    .terminal-window {
      position: relative;
      z-index: 10;
      width: min(900px, 94vw);
      height: 0px; /* Start closed */
      background-color: rgba(10, 10, 10, 0.98);
      border: 1px solid rgba(201, 162, 62, 0); 
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
    }

    /* The Flash Line */
    .terminal-window::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0%; height: 2px;
      background: white;
      box-shadow: 0 0 15px white;
      transform: translate(-50%, -50%);
      z-index: 20;
      opacity: 0;
    }

    /* Booting states */
    .terminal-window.striking::before {
      animation: crt-strike 0.4s ease-out forwards;
    }

    .terminal-window.expanding {
      opacity: 1;
      height: min(600px, 80vh);
      border: 1px solid rgba(201, 162, 62, 0.4);
      transition: height 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67), opacity 0.1s;
      box-shadow: 0 0 40px rgba(192, 140, 207, 0.1), 0 40px 100px rgba(0,0,0,0.9);
    }

    @keyframes crt-strike {
      0% { width: 0%; opacity: 0; }
      50% { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; transform: translate(-50%, -50%) scaleY(0); }
    }

    /* =============================================
       TERMINAL CONTENT
    ============================================= */
    .title-bar {
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--gold-armor);
      flex-shrink: 0;
      opacity: 0;
    }
    .expanding .title-bar { opacity: 1; transition: opacity 0.5s 0.3s; }

    .led {
      width: 8px; height: 8px;
      background-color: var(--active-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--active-green);
      margin-right: 15px;
    }

    .title-label {
      color: var(--gold-armor);
      font-family: 'Cinzel Decorative', serif;
      font-size: 12px;
      letter-spacing: 3px;
    }

    .terminal-body {
      flex: 1;
      padding: 35px;
      color: var(--starlight);
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      line-height: 2.2;
      position: relative;
    }

    .crt-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
    }

    .gold-text { color: var(--gold-armor); text-shadow: 0 0 8px var(--gold-armor); }
  </style>
</head>
<body>

  <div id="boot-overlay">
    <button class="boot-btn" onclick="bootSequence()">Initialize Vanguard</button>
  </div>

  <canvas id="stars"></canvas>

  <div class="terminal-window" id="window">
    <div class="title-bar">
      <div class="led"></div>
      <span class="title-label">Vanguard Knetwerk Active</span>
    </div>

    <div class="terminal-body" id="console">
      <div class="crt-overlay"></div>
      <div id="typewriter"></div>
    </div>
  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, volume, duration, ramp = true) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      if(ramp) gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function bootSequence() {
      // 1. Fade Button
      document.getElementById('boot-overlay').style.opacity = '0';
      audioCtx.resume();
      
      setTimeout(() => {
        document.getElementById('boot-overlay').style.display = 'none';
        const win = document.getElementById('window');
        
        // 2. The Strike Sound & Visual
        playSound(800, 'sawtooth', 0.1, 0.1); // High electric snap
        win.classList.add('striking');
        
        // 3. The Expansion
        setTimeout(() => {
          win.classList.remove('striking');
          win.classList.add('expanding');
          playSound(60, 'sine', 0.2, 2, false); // Low hum starts
          playSound(12000, 'sine', 0.02, 1.5); // High pitched CRT whine
          startTypewriter();
        }, 400);
      }, 600);
    }

    // =============================================
    // TYPEWRITER (SYMBOLS & LINES)
    // =============================================
    const lines = [
      "<span class='gold-text'>[VANGUARD COLD-BOOT SUCCESSFUL]</span>",
      "> Relay: STARLIGHT-7",
      " ",
      "> Syncing with THE RESERVES...",
      "> Accessing THE RUINS...",
      " ",
      "> Knight, the squad is ready. Command?"
    ];

    let lineIdx = 0;
    const container = document.getElementById('typewriter');

    function startTypewriter() {
      if (lineIdx < lines.length) {
        let div = document.createElement('div');
        div.style.marginBottom = "8px";
        container.appendChild(div);
        
        let currentLine = lines[lineIdx];
        if (currentLine.includes('<')) {
          div.innerHTML = currentLine;
          lineIdx++;
          setTimeout(startTypewriter, 400);
        } else {
          let charIdx = 0;
          function typeChar() {
            if (charIdx < currentLine.length) {
              div.textContent += currentLine[charIdx];
              playSound(Math.random() * 50 + 150, 'square', 0.03, 0.05);
              charIdx++;
              setTimeout(typeChar, 30);
            } else {
              lineIdx++;
              setTimeout(startTypewriter, 500);
            }
          }
          typeChar();
        }
      }
    }

    // =============================================
    // STAR ENGINE
    // =============================================
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Star {
      constructor() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this.size = Math.random() * 1.5 + 0.5;
      }
      draw() {
        ctx.fillStyle = "rgba(192, 140, 207, 0.4)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        this.y -= 0.15;
        if (this.y < 0) this.y = canvas.height;
      }
    }

    function init() {
      resize();
      stars = Array.from({ length: 60 }, () => new Star());
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => s.draw());
        requestAnimationFrame(animate);
      }
      animate();
    }

    init();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
