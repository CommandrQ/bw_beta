<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk | Command Decision</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-black: #0A0A0A;
      --navy-depth: #0A2540;
      --gold-armor: #C9A23E;
      --lilac-pulse: #C08CCF;
      --starlight: #F2F6FF;
      --active-green: #00ff41;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-depth) 0%, var(--bg-black) 100%);
      display: flex; justify-content: center; align-items: center;
      font-family: 'Inter', sans-serif;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* =============================================
       TERMINAL WINDOW & BOOT
    ============================================= */
    #boot-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg-black);
      display: flex; justify-content: center; align-items: center;
    }

    .boot-btn {
      padding: 15px 40px; background: transparent;
      border: 2px solid var(--gold-armor); color: var(--gold-armor);
      font-family: 'Cinzel Decorative', serif; font-size: 18px;
      letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
    }

    .terminal-window {
      position: relative; z-index: 10;
      width: min(900px, 94vw); height: 0px; 
      background-color: rgba(10, 10, 10, 0.98);
      border: 1px solid rgba(201, 162, 62, 0.4); border-radius: 4px;
      display: flex; flex-direction: column; overflow: hidden; opacity: 0;
    }

    .terminal-window.expanding {
      opacity: 1; height: min(600px, 80vh);
      transition: height 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67), opacity 0.1s;
    }

    /* =============================================
       ACTION BUTTONS
    ============================================= */
    #action-container {
      margin-top: 40px;
      opacity: 0;
      transition: opacity 1s ease;
      display: flex;
      justify-content: center;
      gap: 20px; /* Space between buttons */
    }

    .vanguard-btn {
      background: var(--bg-black);
      border: 1px solid var(--gold-armor);
      color: var(--gold-armor);
      font-family: 'Orbitron', sans-serif;
      padding: 12px 24px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .vanguard-btn:hover {
      border-color: var(--lilac-pulse);
      color: var(--starlight);
      box-shadow: 0 0 20px var(--lilac-pulse);
      transform: translateY(-2px);
    }

    .vanguard-btn:active {
      background: var(--starlight);
      box-shadow: 0 0 40px var(--starlight);
    }

    /* =============================================
       TERMINAL BODY
    ============================================= */
    .terminal-body {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: 60px 40px; color: var(--starlight);
      font-family: 'Orbitron', sans-serif; font-size: 16px;
      line-height: 2.5; position: relative;
    }

    .cursor {
      display: inline-block; width: 10px; height: 1.2em;
      background-color: var(--active-green); vertical-align: middle;
      margin-left: 8px; box-shadow: 0 0 8px var(--active-green);
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .gold-text { color: var(--gold-armor); text-shadow: 0 0 8px var(--gold-armor); }
  </style>
</head>
<body>

  <div id="boot-overlay">
    <button class="boot-btn" onclick="bootSequence()">Initialize Vanguard</button>
  </div>

  <canvas id="stars"></canvas>

  <div class="terminal-window" id="window">
    <div class="terminal-body" id="console">
      <div id="text-history"></div>
      <div id="active-line">
        <span id="typing-slot"></span><span class="cursor" id="main-cursor"></span>
      </div>
      
      <div id="action-container">
        <button class="vanguard-btn" onclick="nav('directory.html')">Good to be back</button>
      </div>
    </div>
  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, volume, duration) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function bootSequence() {
      document.getElementById('boot-overlay').style.display = 'none';
      audioCtx.resume();
      document.getElementById('window').classList.add('expanding');
      setTimeout(startTypewriter, 800);
    }

    function nav(dest) {
      playSound(500, 'sawtooth', 0.1, 0.2); // Flash click sound
      setTimeout(() => { window.location.href = dest; }, 250);
    }

    const lines = [
      "<span class='gold-text'>[VANGUARD OS v3.2 ONLINE]</span>",
      "> Loading Database.",
      "> loading Options...",
      " ",
      "Welcome Home."
    ];

    let lineIdx = 0;
    const history = document.getElementById('text-history');
    const slot = document.getElementById('typing-slot');

    function startTypewriter() {
      if (lineIdx < lines.length) {
        let currentLine = lines[lineIdx];
        slot.innerHTML = ""; 

        if (currentLine.includes('<') || currentLine === " ") {
          const div = document.createElement('div');
          div.innerHTML = currentLine === " " ? "&nbsp;" : currentLine;
          history.appendChild(div);
          lineIdx++;
          setTimeout(startTypewriter, 600);
        } else {
          let charIdx = 0;
          function typeChar() {
            if (charIdx < currentLine.length) {
              slot.textContent += currentLine[charIdx];
              playSound(Math.random() * 50 + 150, 'square', 0.03, 0.05);
              charIdx++;
              setTimeout(typeChar, 40);
            } else {
              const finishedLine = document.createElement('div');
              finishedLine.textContent = currentLine;
              history.appendChild(finishedLine);
              slot.textContent = "";
              lineIdx++;
              setTimeout(startTypewriter, 800);
            }
          }
          typeChar();
        }
      } else {
        // FINISHED TYPING: Wait 2s then fade in buttons
        document.getElementById('main-cursor').style.display = 'none';
        setTimeout(() => {
          document.getElementById('action-container').style.opacity = '1';
          playSound(800, 'sine', 0.05, 0.6); // System alert "ping"
        }, 2000);
      }
    }

    // STAR ENGINE
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    let stars = Array.from({ length: 45 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2 }));
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(242, 246, 255, 0.3)";
      stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill(); s.y -= 0.12; if (s.y < 0) s.y = canvas.height; });
      requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
