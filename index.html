<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard University | Entry Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Quicksand:wght@400;700&display=swap');

        :root {
            --primary-glow: #7c3aed;
            --accent-gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient Background Pulse */
        .portal-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0b2e 0%, #000 100%);
            z-index: -1;
        }

        /* The Main Entry Window */
        .entry-window {
            width: 90%;
            max-width: 900px; /* Increased desktop width */
            background: rgba(10, 5, 20, 0.85);
            border: 2px solid var(--primary-glow);
            padding: 3rem; /* Dynamic padding */
            text-align: center;
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .university-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 5vw, 3rem); /* Scales between mobile and desktop sizes */
            letter-spacing: 0.5rem;
            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: var(--primary-glow);
            letter-spacing: 0.3rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        .welcome-text {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 3rem auto;
            color: #c9d1d9;
        }

        /* The Big "Initialize" Button */
        .enter-btn {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 1.2rem 3.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.4s ease;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }

        .enter-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 30px var(--accent-gold);
            transform: translateY(-3px);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .entry-window {
                padding: 2rem 1.5rem;
                width: 85%;
            }
            .welcome-text {
                margin-bottom: 2rem;
            }
            .enter-btn {
                padding: 1rem 2rem;
                width: 100%; /* Button stretches on small phones */
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="portal-bg"></div>

    <div class="entry-window">
        <div class="university-logo">VANGUARD</div>
        <div class="subtitle">University of Threadarts</div>

        <div class="welcome-text">
            Step into the legacy of the <strong>Knights of Locamet</strong>. Rediscover the simple triad of your nature and stabilize your place in the worldline.
        </div>

        <a href="hub.html" class="enter-btn">INITIALIZE ALIGNMENT</a>
    </div>

</body>
</html>
