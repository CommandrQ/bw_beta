<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 180, 255, 0.1) 0%, transparent 50%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 6vh;
      font-family: 'Courier New', Courier, monospace;
    }

    .terminal-window {
      width: min(860px, 92vw);
      height: min(560px, 80vh);
      background-color: #0d0d0d;
      border-radius: 10px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 30px 80px rgba(0,0,0,0.8),
        0 0 40px rgba(0,255,100,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .title-bar {
      background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
      user-select: none;
    }

    .buttons { display: flex; gap: 8px; align-items: center; }

    .btn {
      width: 13px; height: 13px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.2); }
    .btn-close { background: #ff5f57; border: 1px solid #e0443e; }
    .btn-min   { background: #febc2e; border: 1px solid #d6a21b; }
    .btn-max   { background: #28c840; border: 1px solid #1aab2e; }

    .btn-close::before, .btn-close::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 7px; height: 1.5px;
      background: rgba(0,0,0,0.5);
      border-radius: 1px;
      transform-origin: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .btn-close::before { transform: translate(-50%, -50%) rotate(45deg); }
    .btn-close::after  { transform: translate(-50%, -50%) rotate(-45deg); }
    .btn-close:hover::before, .btn-close:hover::after { opacity: 1; }

    .title-text {
      flex: 1;
      text-align: center;
      color: #888;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .terminal-body {
      flex: 1;
      padding: 18px 20px;
      overflow-y: auto;
      color: #00ff41;
      font-size: 14px;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
      position: relative;
    }
    .terminal-body::-webkit-scrollbar { width: 6px; }
    .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .terminal-body::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: -10%;
      height: 20%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0, 255, 65, 0.03) 40%,
        rgba(0, 255, 65, 0.06) 50%,
        rgba(0, 255, 65, 0.03) 60%,
        transparent 100%
      );
      pointer-events: none;
      animation: scanline-sweep 6s linear infinite;
    }

    @keyframes scanline-sweep {
      0%   { top: -20%; }
      100% { top: 110%; }
    }

    .cursor {
      display: inline-block;
      width: 9px; height: 15px;
      background: #00ff41;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="terminal-window">
    <div class="title-bar">
      <div class="buttons">
        <div class="btn btn-close"></div>
        <div class="btn btn-min"></div>
        <div class="btn btn-max"></div>
      </div>
      <div class="title-text">guest@yoursite — bash — 80×24</div>
    </div>

    <div class="terminal-body">
      <span class="cursor"></span>
    </div>
  </div>
</body>
</html>
