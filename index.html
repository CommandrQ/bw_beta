<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk | Star-Lit Terminal</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Orbitron:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-black: #0A0A0A;
      --navy-depth: #0A2540;
      --gold-armor: #C9A23E;
      --lilac-pulse: #C08CCF;
      --starlight: #F2F6FF;
      --active-green: #00ff41; /* Vanguard Active Green */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

    body {
      width: 100%; height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, var(--navy-depth) 0%, var(--bg-black) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
    }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* =============================================
       TERMINAL WINDOW
    ============================================= */
    .terminal-window {
      position: relative;
      z-index: 10;
      width: min(900px, 94vw);
      height: min(600px, 80vh);
      background-color: rgba(10, 10, 10, 0.92);
      border: 1px solid rgba(201, 162, 62, 0.4); 
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(192, 140, 207, 0.1), 0 40px 100px rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .title-bar {
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--gold-armor);
      flex-shrink: 0;
    }

    .btn-close {
      width: 14px; height: 14px;
      background: var(--bg-black);
      border: 1px solid var(--gold-armor);
      transition: all 0.2s;
    }
    .btn-close:hover { background: var(--gold-armor); box-shadow: 0 0 10px var(--gold-armor); }

    .title-text {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px; /* Spacing for the LED */
    }

    /* THE GREEN LED */
    .led {
      width: 8px;
      height: 8px;
      background-color: var(--active-green);
      border-radius: 50%;
      box-shadow: 
        0 0 5px var(--active-green),
        0 0 12px var(--active-green),
        0 0 20px rgba(0, 255, 65, 0.4);
      animation: led-blink 2s ease-in-out infinite;
    }

    @keyframes led-blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.95); }
    }

    .title-label {
      color: var(--gold-armor);
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(201, 162, 62, 0.6);
    }

    .terminal-body {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      color: var(--starlight);
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      line-height: 2;
      position: relative;
      scrollbar-width: none;
    }

    .gold-text { color: var(--gold-armor); text-shadow: 0 0 8px var(--gold-armor); }
    .lilac-text { color: var(--lilac-pulse); text-shadow: 0 0 8px var(--lilac-pulse); }

    .copyright {
      position: relative;
      z-index: 1;
      margin-top: 20px;
      color: var(--starlight);
      opacity: 0.5;
      font-size: 10px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="terminal-window">
    <div class="title-bar">
      <div class="btn-close" title="Close Session"></div>
      <div class="title-text">
        <div class="led"></div> <span class="title-label">Vanguard Knetwerk Active</span>
      </div>
    </div>

    <div class="terminal-body" id="console">
      <div id="typewriter"></div>
    </div>
  </div>

  <p class="copyright">AUTHENTICATED BY VANGUARD CITIZEN SERVICES &copy; 2026</p>

  <script>
    // =============================================
    // STAR & CONSTELLATION ENGINE
    // =============================================
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let mouse = { x: null, y: null };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.rotation = Math.random() * Math.PI;
        this.rotationSpeed = (Math.random() - 0.5) * 0.01;
        this.speed = Math.random() * 0.12 + 0.04; 
        this.opacity = Math.random();
        this.pulse = Math.random() * 0.01;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const r = (i % 2 === 0) ? this.size * 3.5 : this.size;
          const angle = (Math.PI * i) / 4;
          ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        }
        ctx.closePath();
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#F2F6FF";
        ctx.fillStyle = `rgba(242, 246, 255, ${this.opacity})`;
        ctx.fill();
        ctx.restore();

        this.y -= this.speed;
        this.rotation += this.rotationSpeed;
        this.opacity += this.pulse;
        if (this.opacity > 1 || this.opacity < 0.2) this.pulse *= -1;
        if (this.y < -20) this.y = canvas.height + 20;
      }
    }

    function drawConstellations() {
      const maxDist = 160;
      for (let a = 0; a < stars.length; a++) {
        for (let b = a; b < stars.length; b++) {
          const dx = stars[a].x - stars[b].x;
          const dy = stars[a].y - stars[b].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < maxDist) {
            const opacity = 1 - (distance / maxDist);
            ctx.strokeStyle = `rgba(192, 140, 207, ${opacity * 0.12})`; 
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(stars[a].x, stars[a].y);
            ctx.lineTo(stars[b].x, stars[b].y);
            ctx.stroke();
          }
        }
        if (mouse.x) {
          const mdx = stars[a].x - mouse.x;
          const mdy = stars[a].y - mouse.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mDist < 220) {
            const mOpacity = 1 - (mDist / 220);
            ctx.strokeStyle = `rgba(201, 162, 62, ${mOpacity * 0.22})`;
            ctx.beginPath();
            ctx.moveTo(stars[a].x, stars[a].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
          }
        }
      }
    }

    function init() {
      resize();
      stars = Array.from({ length: 75 }, () => new Star());
      animate();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawConstellations();
      stars.forEach(s => s.draw());
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    init();

    // =============================================
    // TYPEWRITER
    // =============================================
    const lines = [
      "<span class='gold-text'>[VANGUARD OS v3.2 ONLINE]</span>",
      "Starlight relay synchronized. Armor diagnostics: <span class='gold-text'>OPTIMAL</span>.",
      " ",
      "> Accessing <span class='gold-text'>THE RESERVES</span>...",
      "> 42 combat assets identified. All systems locked.",
      " ",
      "> Scanning <span class='lilac-text'>THE RUINS</span>...",
      "> Status: Data decay halted. Ancient signatures detected.",
      " ",
      "> Welcome back, Knight. LED indicates secure uplink."
    ];

    const container = document.getElementById('typewriter');
    let lineIdx = 0;

    function type() {
      if (lineIdx < lines.length) {
        let div = document.createElement('div');
        div.style.marginBottom = "10px";
        div.innerHTML = lines[lineIdx];
        container.appendChild(div);
        lineIdx++;
        setTimeout(type, 700);
      }
    }
    setTimeout(type, 1000);
  </script>
</body>
</html>
