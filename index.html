<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Knetwerk</title>
  <style>
    /* =============================================
       RESET
    ============================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* =============================================
       BACKDROP
    ============================================= */
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #080810;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 6vh;
      font-family: 'Courier New', Courier, monospace;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* =============================================
       TERMINAL WINDOW
    ============================================= */
    .terminal-window {
      position: relative;
      z-index: 1;
      width: min(860px, 92vw);
      height: min(560px, 80vh);
      background-color: #0d0d0d;
      border-radius: 10px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 30px 80px rgba(0,0,0,0.8),
        0 0 40px rgba(0,255,100,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =============================================
       TITLE BAR
    ============================================= */
    .title-bar {
      background: linear-gradient(180deg, #3a3a3a 0%, #2a2a2a 100%);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
      user-select: none;
    }

    .buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      width: 13px; height: 13px;
      border-radius: 50%;
      position: relative;
    }

    /* Red — clickable, navigates to directory.html */
    .btn-close {
      background: #ff5f57;
      border: 1px solid #e0443e;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-close:hover { filter: brightness(1.2); }
    .btn-close::before, .btn-close::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 7px; height: 1.5px;
      background: rgba(0,0,0,0.5);
      border-radius: 1px;
      transform-origin: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .btn-close::before { transform: translate(-50%, -50%) rotate(45deg); }
    .btn-close::after  { transform: translate(-50%, -50%) rotate(-45deg); }
    .btn-close:hover::before,
    .btn-close:hover::after { opacity: 1; }

    /* Yellow & Green — static, not clickable */
    .btn-min {
      background: #febc2e;
      border: 1px solid #d6a21b;
      cursor: default;
      pointer-events: none;
    }
    .btn-max {
      background: #28c840;
      border: 1px solid #1aab2e;
      cursor: default;
      pointer-events: none;
    }

    .title-text {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .led {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00ff41;
      box-shadow: 0 0 4px #00ff41, 0 0 10px #00ff41, 0 0 20px rgba(0,255,65,0.6);
      animation: led-pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes led-pulse {
      0%, 100% { opacity: 1;   box-shadow: 0 0 4px #00ff41, 0 0 10px #00ff41, 0 0 20px rgba(0,255,65,0.6); }
      50%       { opacity: 0.6; box-shadow: 0 0 2px #00ff41, 0 0 5px  #00ff41, 0 0 10px rgba(0,255,65,0.3); }
    }

    .title-label {
      color: #00ff41;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(0,255,65,0.7);
    }

    /* =============================================
       TERMINAL BODY
       — Add your page content inside .terminal-body
    ============================================= */
    .terminal-body {
      flex: 1;
      padding: 18px 20px;
      overflow-y: auto;
      color: #00ff41;
      font-size: 14px;
      line-height: 1.7;
      position: relative;
      scrollbar-width: none;
    }
    .terminal-body::-webkit-scrollbar { display: none; }

    /* Scanline sweep */
    .terminal-body::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: -20%;
      height: 20%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,255,65,0.03) 40%,
        rgba(0,255,65,0.06) 50%,
        rgba(0,255,65,0.03) 60%,
        transparent 100%
      );
      pointer-events: none;
      animation: scanline-sweep 6s linear infinite;
    }

    @keyframes scanline-sweep {
      0%   { top: -20%; }
      100% { top: 110%; }
    }

    .cursor {
      display: inline-block;
      width: 9px; height: 15px;
      background: #00ff41;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* =============================================
       COPYRIGHT
    ============================================= */
    .copyright {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- BACKDROP: animated star field -->
  <canvas id="stars"></canvas>

  <!-- TERMINAL WINDOW -->
  <div class="terminal-window">

    <!-- Title Bar -->
    <div class="title-bar">
      <div class="buttons">
        <div class="btn btn-close" onclick="window.location.href='directory.html'" title="Directory"></div>
        <div class="btn btn-min"></div>
        <div class="btn btn-max"></div>
      </div>
      <div class="title-text">
        <div class="led"></div>
        <span class="title-label">Vanguard Knetwerk active</span>
      </div>
    </div>

    <!-- Body: put your content here -->
    <div class="terminal-body">
      <span class="cursor"></span>
    </div>

  </div>

  <!-- COPYRIGHT -->
  <p class="copyright">&copy; 2026 Vanguard Citizen Services</p>

  <!-- =============================================
       STAR FIELD SCRIPT
  ============================================= -->
  <script>
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');

    const STAR_COUNT = 200;
    let stars = [];

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createStar() {
      return {
        x:         randomBetween(0, canvas.width),
        y:         randomBetween(0, canvas.height),
        radius:    randomBetween(0.4, 1.6),
        phase:     randomBetween(0, Math.PI * 2),
        speed:     randomBetween(0.3, 1.2),
        hue:       randomBetween(38, 52),
        sat:       randomBetween(70, 100),
        baseLight: randomBetween(55, 80),
      };
    }

    function init() {
      resize();
      stars = Array.from({ length: STAR_COUNT }, createStar);
    }

    function draw(timestamp) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const t = timestamp / 1000;

      for (const s of stars) {
        const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
        const alpha   = 0.15 + 0.85 * twinkle;
        const light   = s.baseLight + 10 * twinkle;

        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius * 4);
        glow.addColorStop(0,   `hsla(${s.hue}, ${s.sat}%, ${light}%, ${alpha})`);
        glow.addColorStop(0.4, `hsla(${s.hue}, ${s.sat}%, ${light}%, ${alpha * 0.4})`);
        glow.addColorStop(1,   `hsla(${s.hue}, ${s.sat}%, ${light}%, 0)`);

        ctx.save();
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius * 4, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
        ctx.restore();

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, ${s.sat}%, ${light}%, ${alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => {
      resize();
      stars = Array.from({ length: STAR_COUNT }, createStar);
    });

    init();
    requestAnimationFrame(draw);
  </script>

</body>
</html>
